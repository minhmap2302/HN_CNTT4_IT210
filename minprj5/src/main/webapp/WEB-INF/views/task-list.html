
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Task List</h2>
<a href="/tasks/new">Add</a>
<table border="1">
<tr><th>Title</th><th>Deadline</th><th>Priority</th></tr>
<tr th:each="t : ${tasks}">
<td th:text="${t.title}"></td>
<td th:text="${t.deadline}"></td>
<td th:text="${t.priority}"></td>
</tr>
</table>
</body>
</html>
